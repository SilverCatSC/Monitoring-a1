<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг А1: Детальная аналитика</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #0B0E14; 
            font-family: 'Manrope', sans-serif; 
            color: #E2E8F0; 
            margin: 0; 
            padding: 20px;
        }
        
        @media (min-width: 768px) {
            body { padding: 40px; }
        }
        
        .header { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.05); 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
            gap: 15px;
        }
        
        .header h1 { 
            margin: 0; 
            font-size: clamp(24px, 5vw, 32px); 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .date-badge { 
            background: rgba(255,255,255,0.05); 
            padding: 8px 16px; 
            border-radius: 12px; 
            font-size: 14px; 
            color: #94A3B8; 
            display: flex; 
            align-items: center;
            gap: 10px;
        }
        
        .refresh-btn {
            background: #10B981;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: rgba(30,41,59,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px 25px;
            flex: 1;
            min-width: 150px;
            cursor: help;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(30,41,59,0.6);
        }
        
        .stat-label {
            font-size: 14px;
            color: #64748B;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }
        
        .trend-up { color: #10B981; }
        .trend-down { color: #EF4444; }
        .trend-stable { color: #F59E0B; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); 
            gap: 25px; 
        }
        
        .card { 
            background: rgba(30,41,59,0.4); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 20px; 
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .card-header {
            padding: 20px 20px 0 20px;
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .car-title { 
            font-size: 20px; 
            font-weight: 800; 
            color: #fff; 
        }
        
        .car-vin { 
            font-family: monospace; 
            color: #94A3B8; 
            font-size: 11px; 
            background: rgba(0,0,0,0.3); 
            padding: 4px 8px; 
            border-radius: 6px; 
        }
        
        .platforms { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
            padding: 0 20px;
        }
        
        .platform { 
            flex: 1; 
            background: rgba(0,0,0,0.3); 
            border-radius: 12px; 
            overflow: hidden;
        }
        
        .platform-image {
            width: 100%;
            height: 160px;
            overflow: hidden;
            background: #0B0E14;
        }
        
        .platform-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .platform-info {
            padding: 12px;
        }
        
        .plat-name { 
            font-size: 13px; 
            color: #64748B; 
            font-weight: 600; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
        }
        
        .plat-price { 
            font-size: 20px; 
            font-weight: 800; 
            color: #10B981; 
        }
        
        .plat-status { 
            font-size: 12px; 
            font-weight: 600;
            margin-top: 4px;
        }
        
        .chart-container {
            padding: 0 20px 20px 20px;
            margin-top: 10px;
        }
        
        .chart-title {
            font-size: 12px;
            color: #64748B;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        canvas {
            max-height: 200px;
            width: 100%;
        }
        
        .history-section {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }
        
        .history-title { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #64748B; 
            margin-bottom: 12px; 
            font-weight: 600;
        }
        
        .history-table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }
        
        .history-table th {
            text-align: left;
            padding: 8px 4px;
            color: #64748B;
            font-weight: 600;
        }
        
        .history-table td {
            padding: 6px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .status-found { background: rgba(16,185,129,0.2); color: #10B981; }
        .status-far { background: rgba(245,158,11,0.2); color: #F59E0B; }
        .status-archive { background: rgba(239,68,68,0.2); color: #EF4444; }
        .status-not-found { background: rgba(100,116,139,0.2); color: #94A3B8; }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            margin-left: 8px;
        }
        
        .priority-high { background: #F97316; color: white; }
        .priority-medium { background: #F59E0B; color: white; }
        .priority-low { background: #64748B; color: white; }
        
        .insight {
            padding: 12px 20px;
            background: rgba(16,185,129,0.1);
            border-left: 3px solid #10B981;
            margin: 0 20px 20px 20px;
            border-radius: 8px;
            font-size: 12px;
        }
        
        .insight.warning {
            background: rgba(239,68,68,0.1);
            border-left-color: #EF4444;
        }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .platforms { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📈 Мониторинг А1: Детальная аналитика</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div class="date-badge">
                📅 <span id="update-time">...</span>
            </div>
            <button class="refresh-btn" onclick="location.reload()">
                🔄 Обновить
            </button>
        </div>
    </div>

    <div class="stats-bar" id="stats-bar" style="display: none;">
        <div class="stat-card" title="Всего автомобилей">
            <div class="stat-label">🚗 Всего</div>
            <div class="stat-value" id="total-cars">0</div>
        </div>
        <div class="stat-card" title="Средняя позиция на Auto.ru">
            <div class="stat-label">📊 Средняя позиция Auto</div>
            <div class="stat-value" id="avg-auto-pos">-</div>
        </div>
        <div class="stat-card" title="Средняя позиция на Avito">
            <div class="stat-label">📊 Средняя позиция Avito</div>
            <div class="stat-value" id="avg-avito-pos">-</div>
        </div>
        <div class="stat-card" title="Улучшили позиции за неделю">
            <div class="stat-label">📈 Улучшили позиции</div>
            <div class="stat-value trend-up" id="improved">0</div>
        </div>
        <div class="stat-card" title="Ухудшили позиции за неделю">
            <div class="stat-label">📉 Ухудшили позиции</div>
            <div class="stat-value trend-down" id="declined">0</div>
        </div>
    </div>

    <div class="grid" id="cars-container">
        <div class="loading">⏳ Загрузка данных...</div>
    </div>

    <script>
        // Конвертация статуса в числовую позицию
        function statusToPosition(status) {
            if (!status || status === "Нет") return 100;
            if (status.includes("Стр. 1")) return 1;
            if (status.includes("Стр. 2")) return 2;
            if (status.includes("Стр. 3+")) return 4;
            if (status.includes("Архив")) return 99;
            return 50;
        }
        
        function getStatusInfo(status) {
            if (!status || status === "Нет") {
                return { text: "❌ Не найден", class: "status-not-found" };
            }
            if (status.includes("Архив")) {
                return { text: "📦 В архиве", class: "status-archive" };
            }
            if (status.includes("Стр. 1")) {
                return { text: status, class: "status-found" };
            }
            if (status.includes("Стр. 2")) {
                return { text: status, class: "status-found" };
            }
            if (status.includes("Стр. 3+")) {
                return { text: status, class: "status-far" };
            }
            return { text: status, class: "status-far" };
        }
        
        function getPriorityClass(priority) {
            if (priority === "Высокий") return "priority-high";
            if (priority === "Средний") return "priority-medium";
            return "priority-low";
        }
        
        // Анализ динамики за последние 7 дней
        function analyzeTrend(history, platform) {
            if (!history || history.length < 2) return { trend: "stable", change: 0, message: "Недостаточно данных" };
            
            const recent = history.slice(-7);
            if (recent.length < 2) return { trend: "stable", change: 0, message: "Недостаточно данных" };
            
            const first = statusToPosition(recent[0][`${platform}_status`]);
            const last = statusToPosition(recent[recent.length - 1][`${platform}_status`]);
            const change = first - last; // Положительное = улучшение
            
            if (change > 0) return { trend: "up", change: change, message: `Улучшилась на ${change} позицию` };
            if (change < 0) return { trend: "down", change: Math.abs(change), message: `Ухудшилась на ${Math.abs(change)} позицию` };
            return { trend: "stable", change: 0, message: "Без изменений" };
        }
        
        function loadData() {
            fetch('data.json?_=' + Date.now())
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    document.getElementById('update-time').innerText = data.last_updated;
                    
                    const container = document.getElementById('cars-container');
                    container.innerHTML = '';
                    
                    let totalCars = 0;
                    let totalAutoPos = 0;
                    let totalAvitoPos = 0;
                    let autoCount = 0;
                    let avitoCount = 0;
                    let improved = 0;
                    let declined = 0;
                    
                    const sortedCars = Object.entries(data.cars).sort((a, b) => {
                        const aPriority = { "Высокий": 0, "Средний": 1, "Стандартный": 2 }[a[1].priority] || 2;
                        const bPriority = { "Высокий": 0, "Средний": 1, "Стандартный": 2 }[b[1].priority] || 2;
                        return aPriority - bPriority;
                    });
                    
                    for (const [vin, carInfo] of sortedCars) {
                        totalCars++;
                        const history = carInfo.history;
                        const current = history[history.length - 1] || {};
                        
                        // Подсчет средних позиций
                        const autoPos = statusToPosition(current.auto_status);
                        const avitoPos = statusToPosition(current.avito_status);
                        if (autoPos < 50) { totalAutoPos += autoPos; autoCount++; }
                        if (avitoPos < 50) { totalAvitoPos += avitoPos; avitoCount++; }
                        
                        // Анализ трендов
                        const autoTrend = analyzeTrend(history, 'auto');
                        const avitoTrend = analyzeTrend(history, 'avito');
                        
                        if (autoTrend.trend === 'up' || avitoTrend.trend === 'up') improved++;
                        if (autoTrend.trend === 'down' || avitoTrend.trend === 'down') declined++;
                        
                        // Формирование инсайтов
                        let insightHtml = '';
                        if (autoPos >= 99 || avitoPos >= 99) {
                            insightHtml = `<div class="insight warning">
                                ⚠️ <strong>Требует внимания!</strong> Объявление не найдено или в архиве. Рекомендуется проверить и обновить.
                            </div>`;
                        } else if (autoTrend.trend === 'down' || avitoTrend.trend === 'down') {
                            insightHtml = `<div class="insight warning">
                                📉 <strong>Падение позиций!</strong> ${autoTrend.message} на Auto.ru, ${avitoTrend.message} на Avito.
                            </div>`;
                        } else if (autoTrend.trend === 'up' || avitoTrend.trend === 'up') {
                            insightHtml = `<div class="insight">
                                📈 <strong>Положительная динамика!</strong> ${autoTrend.message} на Auto.ru, ${avitoTrend.message} на Avito.
                            </div>`;
                        }
                        
                        // Подготовка данных для графика
                        const last7Days = history.slice(-7);
                        const dates = last7Days.map(h => h.date.split(' ')[0].slice(5));
                        const autoPositions = last7Days.map(h => statusToPosition(h.auto_status));
                        const avitoPositions = last7Days.map(h => statusToPosition(h.avito_status));
                        
                        const chartId = `chart-${vin.replace(/[^a-zA-Z0-9]/g, '')}`;
                        
                        const autoInfo = getStatusInfo(current.auto_status);
                        const avitoInfo = getStatusInfo(current.avito_status);
                        const priorityClass = getPriorityClass(carInfo.priority);
                        
                        const autoImg = current.auto_img || 'https://via.placeholder.com/400x200?text=No+Image';
                        const avitoImg = current.avito_img || 'https://via.placeholder.com/400x200?text=No+Image';
                        
                        // Таблица истории
                        let historyTableHtml = `
                            <table class="history-table">
                                <thead>
                                    <tr>
                                        <th>Дата</th>
                                        <th>Auto.ru статус</th>
                                        <th>Auto.ru цена</th>
                                        <th>Avito статус</th>
                                        <th>Avito цена</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;
                        
                        history.slice(-10).reverse().forEach(h => {
                            const hAutoInfo = getStatusInfo(h.auto_status);
                            const hAvitoInfo = getStatusInfo(h.avito_status);
                            historyTableHtml += `
                                <tr>
                                    <td>${h.date}</td>
                                    <td><span class="status-badge ${hAutoInfo.class}">${hAutoInfo.text}</span></td>
                                    <td>${h.auto_price || '-'}</td>
                                    <td><span class="status-badge ${hAvitoInfo.class}">${hAvitoInfo.text}</span></td>
                                    <td>${h.avito_price || '-'}</td>
                                </tr>
                            `;
                        });
                        
                        historyTableHtml += `</tbody></table>`;
                        
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-header">
                                <div>
                                    <div class="car-title">
                                        ${carInfo.title}
                                        <span class="badge ${priorityClass}">${carInfo.priority || 'Стандартный'}</span>
                                    </div>
                                </div>
                                <div class="car-vin">🔢 ${vin}</div>
                            </div>
                            <div class="platforms">
                                <div class="platform">
                                    <div class="platform-image">
                                        <img src="${autoImg}" alt="Auto.ru" loading="lazy" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                                    </div>
                                    <div class="platform-info">
                                        <div class="plat-name">🚗 Auto.ru</div>
                                        <div class="plat-price">${current.auto_price || '—'}</div>
                                        <div class="plat-status ${autoInfo.class}">${autoInfo.text}</div>
                                        ${current.auto_ai_warn ? `<div style="font-size:10px; color:#F59E0B; margin-top:4px;">⚠️ ${current.auto_ai_warn}</div>` : ''}
                                    </div>
                                </div>
                                <div class="platform">
                                    <div class="platform-image">
                                        <img src="${avitoImg}" alt="Avito" loading="lazy" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                                    </div>
                                    <div class="platform-info">
                                        <div class="plat-name">📱 Avito</div>
                                        <div class="plat-price">${current.avito_price || '—'}</div>
                                        <div class="plat-status ${avitoInfo.class}">${avitoInfo.text}</div>
                                    </div>
                                </div>
                            </div>
                            ${insightHtml}
                            <div class="chart-container">
                                <div class="chart-title">📊 Динамика позиций (последние 7 дней)</div>
                                <canvas id="${chartId}" style="max-height: 200px;"></canvas>
                            </div>
                            <div class="history-section">
                                <div class="history-title">📋 История изменений (последние 10 записей)</div>
                                ${historyTableHtml}
                            </div>
                        `;
                        container.appendChild(card);
                        
                        // Создаем график после добавления в DOM
                        setTimeout(() => {
                            const ctx = document.getElementById(chartId)?.getContext('2d');
                            if (ctx && dates.length > 0) {
                                new Chart(ctx, {
                                    type: 'line',
                                    data: {
                                        labels: dates,
                                        datasets: [
                                            {
                                                label: 'Auto.ru позиция',
                                                data: autoPositions,
                                                borderColor: '#3B82F6',
                                                backgroundColor: 'rgba(59,130,246,0.1)',
                                                tension: 0.3,
                                                fill: true
                                            },
                                            {
                                                label: 'Avito позиция',
                                                data: avitoPositions,
                                                borderColor: '#8B5CF6',
                                                backgroundColor: 'rgba(139,92,246,0.1)',
                                                tension: 0.3,
                                                fill: true
                                            }
                                        ]
                                    },
                                    options: {
                                        responsive: true,
                                        maintainAspectRatio: true,
                                        plugins: {
                                            legend: { position: 'top', labels: { color: '#94A3B8', font: { size: 10 } } },
                                            tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw === 100 ? 'Не найден' : ctx.raw === 99 ? 'Архив' : ctx.raw + ' страница'}` } }
                                        },
                                        scales: {
                                            y: { 
                                                reverse: true,
                                                min: 0.5,
                                                max: 5.5,
                                                ticks: { 
                                                    stepSize: 1,
                                                    callback: (val) => val === 1 ? '1 стр' : val === 2 ? '2 стр' : val === 4 ? '3+ стр' : val === 99 ? 'Архив' : val === 100 ? 'Нет' : '',
                                                    color: '#64748B'
                                                },
                                                grid: { color: 'rgba(255,255,255,0.05)' }
                                            },
                                            x: { ticks: { color: '#64748B', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                                        }
                                    }
                                });
                            }
                        }, 100);
                    }
                    
                    // Обновляем статистику
                    document.getElementById('total-cars').innerText = totalCars;
                    document.getElementById('avg-auto-pos').innerText = autoCount > 0 ? (totalAutoPos / autoCount).toFixed(1) : '-';
                    document.getElementById('avg-avito-pos').innerText = avitoCount > 0 ? (totalAvitoPos / avitoCount).toFixed(1) : '-';
                    document.getElementById('improved').innerText = improved;
                    document.getElementById('declined').innerText = declined;
                    document.getElementById('stats-bar').style.display = 'flex';
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    document.getElementById('cars-container').innerHTML = `
                        <div style="background: rgba(239,68,68,0.1); border: 1px solid #EF4444; border-radius: 16px; padding: 30px; text-align: center;">
                            <h3>❌ Ошибка загрузки данных</h3>
                            <p>Не удалось загрузить data.json</p>
                            <button onclick="location.reload()" style="background:#10B981; border:none; color:white; padding:10px 20px; border-radius:8px; cursor:pointer; margin-top:10px;">
                                Повторить
                            </button>
                        </div>
                    `;
                });
        }
        
        loadData();
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
