<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг А1: Дашборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0B0E14; 
            font-family: 'Manrope', sans-serif; 
            color: #E2E8F0; 
            margin: 0; padding: 40px; 
        }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 32px; font-weight: 800; }
        .date-badge { background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 12px; font-size: 16px; color: #94A3B8; display: flex; align-items: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 25px; }
        
        .card { 
            background: rgba(30,41,59,0.4); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 16px; padding: 20px; 
        }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .car-title { font-size: 18px; font-weight: 800; color: #fff; }
        .car-vin { font-family: monospace; color: #94A3B8; font-size: 14px; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 6px; }
        
        .platforms { display: flex; gap: 15px; margin-bottom: 20px; }
        .platform { flex: 1; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .plat-name { font-size: 14px; color: #64748B; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .plat-price { font-size: 20px; font-weight: 800; color: #10B981; }
        .plat-status { font-size: 14px; margin-top: 4px; color: #94A3B8; }
        
        .history-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #64748B; margin-bottom: 10px; }
        .history-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .history-row:last-child { border: none; }
        .h-date { color: #94A3B8; width: 80px; }
        .h-val { color: #E2E8F0; }
        
        .status-ok { color: #3B82F6; }
        .status-bad { color: #F97316; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Аналитика Размещения Автомобилей</h1>
        <div class="date-badge" id="last-update">Обновление: ...</div>
    </div>

    <div class="grid" id="cars-container">
        </div>

    <script>
        // Функция для определения цвета статуса
        function getStatusClass(status) {
            if (status.includes("Стр. 3+") || status.includes("Архив") || status.includes("Нет")) return "status-bad";
            return "status-ok";
        }

        // Загрузка JSON файла (он должен лежать в той же папке, что и index.html)
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('last-update').innerText = 'Обновлено: ' + data.last_updated;
                
                const container = document.getElementById('cars-container');
                
                for (const [vin, carInfo] of Object.entries(data.cars)) {
                    // Берем последнюю запись из истории как текущие данные
                    const history = carInfo.history;
                    const current = history[history.length - 1] || {};
                    
                    // Формируем блок истории
                    let historyHtml = '';
                    // Показываем последние 4 недели
                    const recentHistory = history.slice(-4).reverse(); 
                    recentHistory.forEach(h => {
                        historyHtml += `
                            <div class="history-row">
                                <span class="h-date">${h.date}</span>
                                <span class="h-val">Auto: <span class="${getStatusClass(h.auto_status)}">${h.auto_status}</span></span>
                                <span class="h-val">Avito: <span class="${getStatusClass(h.avito_status)}">${h.avito_status}</span></span>
                            </div>
                        `;
                    });

                    // Создаем карточку
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="car-title">${carInfo.title}</div>
                            <div class="car-vin">${vin}</div>
                        </div>
                        <div class="platforms">
                            <div class="platform">
                                <div class="plat-name">Auto.ru</div>
                                <div class="plat-price">${current.auto_price || '-'}</div>
                                <div class="plat-status ${getStatusClass(current.auto_status || '')}">${current.auto_status || 'Нет данных'}</div>
                            </div>
                            <div class="platform">
                                <div class="plat-name">Avito</div>
                                <div class="plat-price">${current.avito_price || '-'}</div>
                                <div class="plat-status ${getStatusClass(current.avito_status || '')}">${current.avito_status || 'Нет данных'}</div>
                            </div>
                        </div>
                        <div class="history">
                            <div class="history-title">Динамика позиций (4 недели)</div>
                            ${historyHtml}
                        </div>
                    `;
                    container.appendChild(card);
                }
            })
            .catch(error => {
                console.error('Ошибка загрузки данных:', error);
                document.getElementById('cars-container').innerHTML = '<p style="color:#F97316;">Не удалось загрузить data.json. Убедитесь, что файл отправлен в репозиторий.</p>';
            });
    </script>
</body>
</html>
