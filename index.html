<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг А1: Дашборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #0B0E14; 
            font-family: 'Manrope', sans-serif; 
            color: #E2E8F0; 
            margin: 0; 
            padding: 20px;
        }
        
        @media (min-width: 768px) {
            body { padding: 40px; }
        }
        
        .header { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.05); 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
            gap: 15px;
        }
        
        .header h1 { 
            margin: 0; 
            font-size: clamp(24px, 5vw, 32px); 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .date-badge { 
            background: rgba(255,255,255,0.05); 
            padding: 8px 16px; 
            border-radius: 12px; 
            font-size: 14px; 
            color: #94A3B8; 
            display: flex; 
            align-items: center;
            gap: 10px;
        }
        
        .refresh-btn {
            background: #10B981;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: rgba(30,41,59,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px 25px;
            flex: 1;
            min-width: 150px;
            cursor: help;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(30,41,59,0.6);
        }
        
        .stat-label {
            font-size: 14px;
            color: #64748B;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }
        
        .stat-card:nth-child(1) .stat-value { color: #3B82F6; }
        .stat-card:nth-child(2) .stat-value { color: #10B981; }
        .stat-card:nth-child(3) .stat-value { color: #F59E0B; }
        .stat-card:nth-child(4) .stat-value { color: #EF4444; }
        .stat-card:nth-child(5) .stat-value { color: #8B5CF6; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); 
            gap: 25px; 
        }
        
        .card { 
            background: rgba(30,41,59,0.4); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 20px; 
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .card-content {
            padding: 20px;
        }
        
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .car-title { 
            font-size: 18px; 
            font-weight: 800; 
            color: #fff; 
        }
        
        .car-vin { 
            font-family: monospace; 
            color: #94A3B8; 
            font-size: 11px; 
            background: rgba(0,0,0,0.3); 
            padding: 4px 8px; 
            border-radius: 6px; 
        }
        
        .platforms { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
        }
        
        .platform { 
            flex: 1; 
            background: rgba(0,0,0,0.3); 
            border-radius: 12px; 
            overflow: hidden;
            transition: all 0.2s;
        }
        
        .platform:hover {
            background: rgba(0,0,0,0.5);
        }
        
        .platform-image {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #0B0E14;
        }
        
        .platform-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        
        .platform:hover .platform-image img {
            transform: scale(1.05);
        }
        
        .platform-info {
            padding: 12px;
        }
        
        .plat-name { 
            font-size: 13px; 
            color: #64748B; 
            font-weight: 600; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .plat-price { 
            font-size: 20px; 
            font-weight: 800; 
            color: #10B981; 
            margin-bottom: 4px;
        }
        
        .plat-status { 
            font-size: 12px; 
            font-weight: 600;
        }
        
        .history-title { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #64748B; 
            margin-bottom: 12px; 
            font-weight: 600;
            margin-top: 15px;
        }
        
        .history-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 11px; 
            padding: 8px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        
        .history-row:last-child { 
            border: none; 
        }
        
        .h-date { 
            color: #94A3B8; 
            width: 80px; 
            font-weight: 500;
        }
        
        .h-val { 
            color: #E2E8F0; 
            flex: 1;
            display: flex;
            gap: 12px;
        }
        
        .h-val span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Статусы */
        .status-found { color: #10B981; }
        .status-far { color: #F59E0B; }
        .status-archive { color: #EF4444; }
        .status-not-found { color: #64748B; }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            margin-left: 8px;
        }
        
        .priority-high { background: #F97316; color: white; }
        .priority-medium { background: #F59E0B; color: white; }
        .priority-low { background: #64748B; color: white; }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #64748B;
        }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .platforms { flex-direction: column; }
            .platform-image { height: 150px; }
        }
        
        .no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: #64748B;
            font-size: 12px;
        }
        
        .image-error {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📸 Мониторинг Размещения Автомобилей</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div class="date-badge">
                📅 <span id="update-time">...</span>
            </div>
            <button class="refresh-btn" onclick="location.reload()">
                🔄 Обновить
            </button>
        </div>
    </div>

    <div class="stats-bar" id="stats-bar" style="display: none;">
        <div class="stat-card" title="Всего автомобилей в мониторинге">
            <div class="stat-label">🚗 Всего авто</div>
            <div class="stat-value" id="total-cars">0</div>
        </div>
        <div class="stat-card" title="Найдены на 1-2 страницах выдачи">
            <div class="stat-label">✅ В топе выдачи</div>
            <div class="stat-value" id="top-found">0</div>
        </div>
        <div class="stat-card" title="Найдены дальше 2 страницы">
            <div class="stat-label">📄 Далеко в выдаче</div>
            <div class="stat-value" id="far-found">0</div>
        </div>
        <div class="stat-card" title="Объявление в архиве или продано">
            <div class="stat-label">📦 В архиве</div>
            <div class="stat-value" id="archived">0</div>
        </div>
        <div class="stat-card" title="Не найдены ни на одной площадке">
            <div class="stat-label">⚠️ Не найдены</div>
            <div class="stat-value" id="not-found">0</div>
        </div>
    </div>

    <div class="grid" id="cars-container">
        <div class="loading">⏳ Загрузка данных...</div>
    </div>

    <script>
        function getStatusInfo(status) {
            if (!status || status === "Нет") {
                return { text: "❌ Не найден", class: "status-not-found" };
            }
            if (status.includes("Архив")) {
                return { text: "📦 В архиве", class: "status-archive" };
            }
            if (status.includes("Стр. 1") || status.includes("Стр. 2")) {
                return { text: status, class: "status-found" };
            }
            if (status.includes("Стр. 3+")) {
                return { text: status, class: "status-far" };
            }
            return { text: status, class: "status-far" };
        }
        
        function getPriorityClass(priority) {
            if (priority === "Высокий") return "priority-high";
            if (priority === "Средний") return "priority-medium";
            return "priority-low";
        }
        
        function handleImageError(img, platform) {
            img.onerror = null;
            img.src = `https://via.placeholder.com/400x300?text=No+Image+${platform}`;
        }
        
        function loadData() {
            fetch('data.json?_=' + Date.now())
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    document.getElementById('update-time').innerText = data.last_updated;
                    
                    const container = document.getElementById('cars-container');
                    container.innerHTML = '';
                    
                    let totalCars = 0;
                    let topFound = 0;
                    let farFound = 0;
                    let archived = 0;
                    let notFound = 0;
                    
                    // Сортируем автомобили: сначала не найденные, потом по приоритету
                    const sortedCars = Object.entries(data.cars).sort((a, b) => {
                        const aHistory = a[1].history;
                        const bHistory = b[1].history;
                        const aCurrent = aHistory[aHistory.length - 1] || {};
                        const bCurrent = bHistory[bHistory.length - 1] || {};
                        
                        const aNotFound = (aCurrent.auto_status === "Нет" && aCurrent.avito_status === "Нет");
                        const bNotFound = (bCurrent.auto_status === "Нет" && bCurrent.avito_status === "Нет");
                        
                        if (aNotFound && !bNotFound) return -1;
                        if (!aNotFound && bNotFound) return 1;
                        
                        // По приоритету
                        const priorityOrder = { "Высокий": 0, "Средний": 1, "Стандартный": 2 };
                        const aPriority = priorityOrder[a[1].priority] || 2;
                        const bPriority = priorityOrder[b[1].priority] || 2;
                        return aPriority - bPriority;
                    });
                    
                    for (const [vin, carInfo] of sortedCars) {
                        totalCars++;
                        
                        const history = carInfo.history;
                        const current = history[history.length - 1] || {};
                        
                        const autoStatus = current.auto_status || "Нет";
                        const avitoStatus = current.avito_status || "Нет";
                        
                        // Подсчет статистики
                        const bestStatus = (autoStatus !== "Нет" ? autoStatus : avitoStatus);
                        if (bestStatus === "Нет") {
                            notFound++;
                        } else if (bestStatus.includes("Архив")) {
                            archived++;
                        } else if (bestStatus.includes("Стр. 1") || bestStatus.includes("Стр. 2")) {
                            topFound++;
                        } else {
                            farFound++;
                        }
                        
                        // Формируем историю
                        let historyHtml = '';
                        const recentHistory = history.slice(-6).reverse();
                        recentHistory.forEach(h => {
                            const autoInfo = getStatusInfo(h.auto_status);
                            const avitoInfo = getStatusInfo(h.avito_status);
                            historyHtml += `
                                <div class="history-row">
                                    <span class="h-date">${h.date}</span>
                                    <div class="h-val">
                                        <span>🚗 <span class="${autoInfo.class}">${autoInfo.text}</span></span>
                                        <span>📱 <span class="${avitoInfo.class}">${avitoInfo.text}</span></span>
                                    </div>
                                </div>
                            `;
                        });
                        
                        const priorityClass = getPriorityClass(carInfo.priority);
                        const priorityText = carInfo.priority || 'Стандартный';
                        const autoInfo = getStatusInfo(autoStatus);
                        const avitoInfo = getStatusInfo(avitoStatus);
                        
                        // Получаем URL картинок
                        const autoImg = current.auto_img || 'https://via.placeholder.com/400x300?text=No+Image+Auto.ru';
                        const avitoImg = current.avito_img || 'https://via.placeholder.com/400x300?text=No+Image+Avito';
                        
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-content">
                                <div class="card-header">
                                    <div>
                                        <div class="car-title">
                                            ${carInfo.title}
                                            <span class="badge ${priorityClass}">${priorityText}</span>
                                        </div>
                                    </div>
                                    <div class="car-vin">🔢 ${vin}</div>
                                </div>
                                <div class="platforms">
                                    <div class="platform">
                                        <div class="platform-image">
                                            <img src="${autoImg}" 
                                                 alt="Auto.ru" 
                                                 onerror="handleImageError(this, 'Auto.ru')"
                                                 loading="lazy">
                                        </div>
                                        <div class="platform-info">
                                            <div class="plat-name">
                                                🚗 Auto.ru
                                                ${current.auto_ai_warn ? `<span style="color:#F59E0B;" title="${current.auto_ai_warn}">⚠️</span>` : ''}
                                            </div>
                                            <div class="plat-price">${current.auto_price || '—'}</div>
                                            <div class="plat-status ${autoInfo.class}">${autoInfo.text}</div>
                                        </div>
                                    </div>
                                    <div class="platform">
                                        <div class="platform-image">
                                            <img src="${avitoImg}" 
                                                 alt="Avito" 
                                                 onerror="handleImageError(this, 'Avito')"
                                                 loading="lazy">
                                        </div>
                                        <div class="platform-info">
                                            <div class="plat-name">📱 Avito</div>
                                            <div class="plat-price">${current.avito_price || '—'}</div>
                                            <div class="plat-status ${avitoInfo.class}">${avitoInfo.text}</div>
                                        </div>
                                    </div>
                                </div>
                                <div class="history">
                                    <div class="history-title">📈 Динамика (6 последних проверок)</div>
                                    ${historyHtml || '<div class="history-row">Нет истории</div>'}
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                    
                    document.getElementById('total-cars').innerText = totalCars;
                    document.getElementById('top-found').innerText = topFound;
                    document.getElementById('far-found').innerText = farFound;
                    document.getElementById('archived').innerText = archived;
                    document.getElementById('not-found').innerText = notFound;
                    document.getElementById('stats-bar').style.display = 'flex';
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    document.getElementById('cars-container').innerHTML = `
                        <div style="background: rgba(239,68,68,0.1); border: 1px solid #EF4444; border-radius: 16px; padding: 30px; text-align: center;">
                            <h3>❌ Ошибка загрузки данных</h3>
                            <p>Не удалось загрузить data.json</p>
                            <p style="font-size:12px;">${error.message}</p>
                            <button onclick="location.reload()" style="background:#10B981; border:none; color:white; padding:10px 20px; border-radius:8px; cursor:pointer; margin-top:10px;">
                                Повторить
                            </button>
                        </div>
                    `;
                });
        }
        
        window.handleImageError = handleImageError;
        
        loadData();
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
