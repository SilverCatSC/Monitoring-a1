<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика авто: Авто.ру и Авито</title>
    <style>
        :root {
            --primary-bg: #f4f7f6;
            --text-color: #333;
            --avito-color: #00aaeb;
            --autoru-color: #ff3333;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 200px;
            text-align: center;
        }
        .stat-card h3 {
            margin-top: 0;
            font-size: 1.2rem;
        }
        .stat-card.autoru h3 { color: var(--autoru-color); }
        .stat-card.avito h3 { color: var(--avito-color); }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        input, select, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }
        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge-autoru { background-color: var(--autoru-color); }
        .badge-avito { background-color: var(--avito-color); }
    </style>
</head>
<body>

    <h1>📊 Дашборд статистики объявлений</h1>

    <div class="dashboard">
        <div class="stat-card autoru">
            <h3>Авто.ру (Просмотры)</h3>
            <div class="stat-value" id="autoru-views">0</div>
        </div>
        <div class="stat-card avito">
            <h3>Авито (Просмотры)</h3>
            <div class="stat-value" id="avito-views">0</div>
        </div>
        <div class="stat-card">
            <h3>Всего звонков/сообщений</h3>
            <div class="stat-value" id="total-contacts">0</div>
        </div>
    </div>

    <div class="container">
        <h2>Добавить статистику за день</h2>
        <form id="stat-form" class="form-group">
            <input type="date" id="date" required>
            <select id="platform" required>
                <option value="Авто.ру">Авто.ру</option>
                <option value="Авито">Авито</option>
            </select>
            <input type="text" id="car-model" placeholder="Марка/Модель авто" required>
            <input type="number" id="views" placeholder="Просмотры" min="0" required>
            <input type="number" id="favorites" placeholder="В избранное" min="0" required>
            <input type="number" id="contacts" placeholder="Звонки/Чаты" min="0" required>
            <button type="submit">Добавить запись</button>
        </form>

        <h2>История показателей</h2>
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Площадка</th>
                    <th>Автомобиль</th>
                    <th>Просмотры</th>
                    <th>В избранном</th>
                    <th>Контакты</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script>
        // Инициализация переменных для подсчета
        let autoruViewsTotal = 0;
        let avitoViewsTotal = 0;
        let totalContacts = 0;

        document.getElementById('stat-form').addEventListener('submit', function(e) {
            e.preventDefault();

            // Получаем значения из формы
            const date = document.getElementById('date').value;
            const platform = document.getElementById('platform').value;
            const carModel = document.getElementById('car-model').value;
            const views = parseInt(document.getElementById('views').value);
            const favorites = parseInt(document.getElementById('favorites').value);
            const contacts = parseInt(document.getElementById('contacts').value);

            // Создаем новую строку таблицы
            const tr = document.createElement('tr');
            
            // Выбираем класс для бейджа площадки
            const badgeClass = platform === 'Авто.ру' ? 'badge-autoru' : 'badge-avito';

            tr.innerHTML = `
                <td>${date}</td>
                <td><span class="badge ${badgeClass}">${platform}</span></td>
                <td>${carModel}</td>
                <td>${views}</td>
                <td>${favorites}</td>
                <td>${contacts}</td>
            `;

            // Добавляем строку в начало таблицы
            const tbody = document.getElementById('table-body');
            tbody.insertBefore(tr, tbody.firstChild);

            // Обновляем общую статистику
            if (platform === 'Авто.ру') {
                autoruViewsTotal += views;
                document.getElementById('autoru-views').innerText = autoruViewsTotal;
            } else {
                avitoViewsTotal += views;
                document.getElementById('avito-views').innerText = avitoViewsTotal;
            }
            
            totalContacts += contacts;
            document.getElementById('total-contacts').innerText = totalContacts;

            // Очищаем форму (кроме даты и площадки для удобства ввода)
            document.getElementById('car-model').value = '';
            document.getElementById('views').value = '';
            document.getElementById('favorites').value = '';
            document.getElementById('contacts').value = '';
        });
    </script>
</body>
</html>
